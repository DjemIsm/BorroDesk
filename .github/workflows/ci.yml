name: CI

on:
  push:
    branches: ["main", "polish/docker-ci-render"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore BorroDesk.slnx

      - name: Build
        run: dotnet build BorroDesk.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/BorroDesk.Api.Tests/BorroDesk.Api.Tests.csproj --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/borrodesk-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/borrodesk-ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t borrodesk-api:ci ./backend/BorroDesk.Api

      - name: Build frontend image
        run: docker build -t borrodesk-frontend:ci ./frontend/borrodesk-ui