<main class="workspace-page">
  <section class="page-heading">
    <div>
      <p class="workspace-eyebrow">Requests</p>
      <h2>Tickets</h2>
    </div>
    <button class="action-button" type="button">New ticket</button>
  </section>

  <section class="workspace-card">
    <div class="ticket-table">
      <div class="ticket-table-row table-header">
        <span>Subject</span>
        <span>Status</span>
        <span>Priority</span>
        <span>Owner</span>
      </div>
      <div class="ticket-table-row">
        <span>Payment receipt missing</span>
        <span>Open</span>
        <span>High</span>
        <span>Finance</span>
      </div>
      <div class="ticket-table-row">
        <span>New hardware request</span>
        <span>Pending</span>
        <span>Medium</span>
        <span>IT support</span>
      </div>
      <div class="ticket-table-row">
        <span>Account access review</span>
        <span>Open</span>
        <span>High</span>
        <span>Security</span>
      </div>
    </div>
  </section>
</main>
