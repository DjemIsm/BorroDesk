<main class="workspace-page">
  <section class="page-heading">
    <div>
      <p class="workspace-eyebrow">Support role</p>
      <h2>Team queue</h2>
    </div>
    <span class="status-badge">Support and Admin</span>
  </section>

  <section class="content-grid">
    <article class="workspace-card">
      <h3>Queue load</h3>
      <div class="coverage-bars">
        <span style="--bar-size: 74%">New</span>
        <span style="--bar-size: 58%">In progress</span>
        <span style="--bar-size: 34%">Escalated</span>
      </div>
    </article>
    <article class="workspace-card">
      <h3>Assignments</h3>
      <div class="compact-list">
        <span>Finance queue: 4 open</span>
        <span>IT queue: 8 open</span>
        <span>Security queue: 3 open</span>
      </div>
    </article>
  </section>
</main>
