<main class="workspace-page">
  <section class="page-heading">
    <div>
      <p class="workspace-eyebrow">Today</p>
      <h2>Dashboard</h2>
    </div>
    <span class="status-badge">Live</span>
  </section>

  <section class="metric-grid" aria-label="Workspace metrics">
    <article class="metric-tile">
      <span>Open tickets</span>
      <strong>18</strong>
      <small>Across active queues</small>
    </article>
    <article class="metric-tile">
      <span>Assigned to me</span>
      <strong>6</strong>
      <small>Needs follow-up</small>
    </article>
    <article class="metric-tile">
      <span>SLA health</span>
      <strong>96%</strong>
      <small>On track today</small>
    </article>
  </section>

  <section class="content-grid">
    <article class="workspace-card">
      <h3>Priority queue</h3>
      <div class="compact-list">
        <span>Payment receipt missing</span>
        <span>Vendor onboarding blocked</span>
        <span>Account access review</span>
      </div>
    </article>
    <article class="workspace-card">
      <h3>Team coverage</h3>
      <div class="coverage-bars">
        <span style="--bar-size: 82%">Support</span>
        <span style="--bar-size: 64%">Finance</span>
        <span style="--bar-size: 48%">Security</span>
      </div>
    </article>
  </section>
</main>
